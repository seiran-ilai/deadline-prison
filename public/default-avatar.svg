<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="預設囚犯頭像">
  <!-- 死線監獄預設頭像:黃黑配色,囚犯剪影 + 鐵窗柵欄(email 註冊用戶建檔時帶入) -->
  <rect width="200" height="200" fill="#16150f"/>
  <!-- 鐵窗柵欄(底層,低調黃) -->
  <g fill="#E8B600" opacity=".14">
    <rect x="20" width="6" height="200"/>
    <rect x="62" width="6" height="200"/>
    <rect x="104" width="6" height="200"/>
    <rect x="146" width="6" height="200"/>
    <rect x="188" width="6" height="200"/>
  </g>
  <!-- 囚犯剪影 -->
  <g fill="#E8B600">
    <circle cx="100" cy="88" r="33"/>
    <path d="M40 200c0-36 27-58 60-58s60 22 60 58z"/>
  </g>
  <!-- 囚帽(剪影上的深色帽簷) -->
  <path d="M67 76c4-19 17-30 33-30s29 11 33 30c-10-6-20-8-33-8s-23 2-33 8z" fill="#0b0b09"/>
  <!-- 囚服橫紋 -->
  <g fill="#0b0b09">
    <rect x="50" y="162" width="100" height="9"/>
    <rect x="43" y="182" width="114" height="9"/>
  </g>
</svg>
