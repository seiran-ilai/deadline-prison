<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>死線監獄 ｜ DEADLINE PRISON</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Saira+Stencil+One&family=Space+Mono:wght@400;700&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet" />
    <!-- 網頁載入動畫:立即顯示深底,蓋住 bundle/字體下載期間的白屏,React 首次繪製後淡出 -->
    <style>
      #dp-splash{position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:#0b0b09;transition:opacity .45s ease}
      #dp-splash.dp-hide{opacity:0;pointer-events:none}
      #dp-splash-anim{width:min(680px,92vw)}
      #dp-splash-anim svg{display:block;width:100%;height:auto}
    </style>
  </head>
  <body>
    <div id="dp-splash"><div id="dp-splash-anim"></div></div>
    <div id="root"></div>
    <script type="module" src="/src/splash.js"></script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
